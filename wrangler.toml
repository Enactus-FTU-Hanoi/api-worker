name = "enactus-ftu-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "enactus-ftu-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace after: wrangler d1 create enactus-ftu-db

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"         # Replace after: wrangler kv:namespace create enactus-sessions

[secrets]
# Set via: wrangler secret put JWT_SECRET
# JWT_SECRET = "your-super-secret-key-min-32-chars"

[[routes]]
pattern = "api.enactusftuhanoi.id.vn/*"
zone_name = "enactusftuhanoi.id.vn"

[dev]
port = 8787
local_protocol = "http"
