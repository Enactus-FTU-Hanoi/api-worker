name = "enactus-ftu-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "enactus-ftu-db"
database_id = "1bbb94dd-1599-4c45-817d-e90149582756"  # Replace after: wrangler d1 create enactus-ftu-db

[[kv_namespaces]]
binding = "KV"
id = "296905cec1dc41678096767e535115ee"         # Replace after: wrangler kv:namespace create enactus-sessions

[secrets]
# Set via: wrangler secret put JWT_SECRET
# JWT_SECRET=EnactusFTU@Hanoi2025!XK#9mPqR$vL

[[routes]]
pattern = "api.enactusftuhanoi.id.vn/*"
zone_name = "enactusftuhanoi.id.vn"

[dev]
port = 8787
local_protocol = "http"
